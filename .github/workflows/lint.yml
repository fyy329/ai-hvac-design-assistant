name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[dev]"

      - name: Run Ruff linter
        run: .venv/bin/python -m ruff check src/ tests/ examples/

      - name: Run Ruff formatter check
        run: .venv/bin/python -m ruff format --check src/ tests/ examples/

      - name: Run MyPy
        run: .venv/bin/python -m mypy src tests examples

      - name: Run BasedPyright
        run: .venv/bin/python -m basedpyright --pythonpath .venv/bin/python
